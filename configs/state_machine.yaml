states:
  - BOOT
  - READY
  - RUNNING
  - WATCH
  - DEGRADED
  - MAINTENANCE
  - ESD_0
  - ESD_1
  - ESD_2
  - ESD_3
allowed_transitions:
  BOOT: [READY, MAINTENANCE, ESD_3]
  READY: [RUNNING, MAINTENANCE, ESD_1, ESD_2, ESD_3]
  RUNNING: [WATCH, DEGRADED, ESD_0, ESD_1, ESD_2, ESD_3]
  WATCH: [RUNNING, DEGRADED, ESD_0, ESD_1, ESD_2, ESD_3]
  DEGRADED: [READY, ESD_0, ESD_1, ESD_2, ESD_3]
  MAINTENANCE: [BOOT, READY]
  ESD_0: [READY]
  ESD_1: [READY, MAINTENANCE]
  ESD_2: [MAINTENANCE]
  ESD_3: [MAINTENANCE]
